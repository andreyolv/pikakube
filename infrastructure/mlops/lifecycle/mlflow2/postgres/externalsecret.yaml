apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-app
  namespace: mlflow
spec:
  refreshInterval: 168h
  target:
    name: postgres-app
    creationPolicy: Merge
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        password: "{{ .password }}"
        connection: "postgresql://mlflow:{{ .password }}@postgres-rw.mlflow.svc.cluster.local:5432/mlflow"
  dataFrom:
  - sourceRef:
      generatorRef:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        name: pg-password-generator
      