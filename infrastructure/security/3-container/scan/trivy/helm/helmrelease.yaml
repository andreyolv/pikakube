apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trivy
  namespace: trivy
spec:
  interval: 5m
  chart:
    spec:
      chart: trivy-operator
      version: 0.31.0
      sourceRef:
        kind: HelmRepository
        name: trivy
        namespace: flux-system
  values:
  # https://artifacthub.io/packages/helm/trivy-operator/trivy-operator
  # https://github.com/aquasecurity/trivy-operator/blob/main/deploy/helm/values.yaml
    targetNamespaces: airbyte
    operator:
      builtInTrivyServer: true
    serviceMonitor:
      enabled: true
    trivy:
      ignoreUnfixed: true
    serviceAccount:
      create: true
      annotations: 
        eks.amazonaws.com/role-arn: arn:aws:iam::xxxxxxx:role/trivy-operator-eks-data-dev
