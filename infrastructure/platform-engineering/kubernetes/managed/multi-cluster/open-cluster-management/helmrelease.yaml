apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cluster-manager
  namespace: open-cluster-management
spec:
  interval: 5m
  chart:
    spec:
      chart: cluster-manager
      version: 1.2.1
      sourceRef:
        kind: HelmRepository
        name: ocm
        namespace: flux-system
  values:
  # https://artifacthub.io/packages/helm/ocm-helm-charts/cluster-manager
  # https://github.com/open-cluster-management-io/ocm/blob/main/deploy/cluster-manager/chart/cluster-manager/values.yaml
