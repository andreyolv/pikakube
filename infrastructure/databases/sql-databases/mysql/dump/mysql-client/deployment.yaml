apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-client
  namespace: tests2
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-client
  template:
    metadata:
      labels:
        app: mysql-client
    spec:
      containers:
      - name: tools
        image: alpine/mysql:15.2
        command: ["/bin/sh", "-c", "sleep infinity"]
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: storage
          mountPath: /dump
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: mysql-client
