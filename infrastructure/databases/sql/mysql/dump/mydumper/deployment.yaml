apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydumper
  namespace: tests
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mydumper
  template:
    metadata:
      labels:
        app: mydumper
    spec:
      containers:
      - name: mydumper
        image: mydumper/mydumper
        command: ["/bin/sh", "-c", "sleep infinity"]
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: storage
          mountPath: /dump
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: mysql-client
