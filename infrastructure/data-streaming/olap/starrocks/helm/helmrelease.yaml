apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: starrocks
  namespace: starrocks
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-starrocks
      version: 1.11.0
      sourceRef:
        kind: HelmRepository
        name: starrocks
        namespace: flux-system
  values:
  # https://artifacthub.io/packages/helm/kube-starrocks/kube-starrocks
  # https://github.com/StarRocks/starrocks-kubernetes-operator/blob/main/helm-charts/charts/kube-starrocks/values.yaml
    starrocks: 
      initPassword:
        enabled: true
        passwordSecret: root-password
      metrics:
        serviceMonitor:
          enabled: true
    starRocksFeSpec:
      replicas: 1
      requests:
        cpu: 1
        memory: 2Gi
      storageSpec:  
        name: fe
        storageSize: 8Gi
        logStorageSize: 4Gi  
    starRocksBeSpec:
      replicas: 1
      requests:
        cpu: 1
        memory: 2Gi
      storageSpec:
        name: be
        storageSize: 8Gi
        logStorageSize: 4Gi
    starRocksCnSpec:
      requests:
        cpu: 1
        memory: 2Gi
      storageSpec:
        name: be
        storageSize: 8Gi
        logStorageSize: 4Gi
      autoScalingPolicy:
        maxReplicas: 5
        minReplicas: 1
        hpaPolicy:
          metrics:
            - type: Resource
              resource:
                name: memory
                target:
                  averageUtilization: 60
                  type: Utilization
            - type: Resource
              resource:
                name: cpu
                target:
                  averageUtilization: 60
                  type: Utilization
          behavior:
            scaleUp:
              policies:
                - type: Pods
                  value: 1
                  periodSeconds: 10
            scaleDown:
              selectPolicy: Disabled
